<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>S3Payments</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&family=Bebas+Neue&family=Rajdhani:wght@600,700&family=Space+Grotesk:wght@700,900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-weight:900}
    html,body{width:100%;height:100%;overflow:hidden}
    body{background:#F3F0FF;font-family:sans-serif}
    input,button,select,textarea{font-family:inherit}
    #loading{position:fixed;inset:0;background:linear-gradient(145deg,#FFFFFF 0%,#F3F0FF 40%,#EBF5FF 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s}
    .sp{width:44px;height:44px;border:3px solid rgba(109,40,217,0.20);border-top:3px solid #6D28D9;border-radius:50%;animation:sp 0.8s linear infinite;margin-bottom:16px}
    @keyframes sp{to{transform:rotate(360deg)}}
    .timeline-fill{height:100%}
    #root{width:100%;height:100%;display:flex;flex-direction:column}
  </style>
</head>
